<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#39ff9c" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#39ff9c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGradient" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#b8ffdc"/>
      <stop offset="55%" stop-color="#39ff9c"/>
      <stop offset="100%" stop-color="#0fc476"/>
    </radialGradient>
  </defs>

  <!-- Dark terminal background with subtle green tint -->
  <rect width="64" height="64" rx="14" fill="#0a110e"/>

  <!-- Very subtle inner glow frame -->
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" fill="none" stroke="#1a2b22" stroke-width="1"/>

  <!-- Edges (cyan, slightly transparent so nodes pop) -->
  <g stroke="#22d3ee" stroke-width="3" stroke-linecap="round" opacity="0.95">
    <line x1="32" y1="18" x2="16" y2="46"/>
    <line x1="32" y1="18" x2="48" y2="46"/>
    <line x1="16" y1="46" x2="48" y2="46"/>
  </g>

  <!-- Halo around the "leader" / active node -->
  <circle cx="32" cy="18" r="16" fill="url(#glow)"/>

  <!-- Nodes -->
  <circle cx="32" cy="18" r="7.5" fill="url(#nodeGradient)"/>
  <circle cx="16" cy="46" r="6.5" fill="url(#nodeGradient)"/>
  <circle cx="48" cy="46" r="6.5" fill="url(#nodeGradient)"/>
</svg>
